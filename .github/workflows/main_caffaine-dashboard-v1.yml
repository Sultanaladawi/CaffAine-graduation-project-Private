name: Build and deploy Node.js app to Azure Web App - caffaine-dashboard-v1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        run: |
          npm install
          npm run build --if-present

      - name: Zip artifact for deployment
        run: zip -r release.zip . --exclude "*.git*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0F6B7907024042AAB7E4FA11BC308937 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_03EC44F9C752451B9106C8DC9E813EEA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9776E04F61E6406B8AF9CA808C0F7CDB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'caffaine-dashboard-v1'
          slot-name: 'Production'
          package: release.zip