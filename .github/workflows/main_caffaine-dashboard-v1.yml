name: Build and deploy Node.js app to Azure Web App - caffaine-dashboard-v1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install and build
        run: |
          npm install
          npm run build --if-present

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r build deploy/
          cp -r node_modules deploy/
          cp server.js deploy/
          cp package.json deploy/
          cp .deployment deploy/ 2>/dev/null || true

      - name: Zip deployment package
        run: cd deploy && zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0F6B7907024042AAB7E4FA11BC308937 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_03EC44F9C752451B9106C8DC9E813EEA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9776E04F61E6406B8AF9CA808C0F7CDB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'caffaine-dashboard-v1'
          slot-name: 'Production'
          package: release.zip